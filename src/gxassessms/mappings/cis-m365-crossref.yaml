# CIS Microsoft 365 Benchmark cross-reference mappings.
#
# Maps CIS control IDs to tool-native check IDs across all supported tools.
# The 'semantic' key provides a natural-language description for AI QA context
# and report narratives -- it is NOT used for lookup or dedup.
#
# Format:
#   cis:m365:{control_id}:
#     scubagear: "MS.{MODULE}.{check}"
#     maester_cisa: "CISA.MS.{PRODUCT}.{check}"  (CISA SCuBA overlap)
#     maester_cis: "CIS.M365.{control}"           (CIS benchmark tests)
#     monkey365: "m365.{module}.{check}"
#     m365_assess: "{control_id}"
#     semantic: "{human-readable description}"
#
# Maintenance:
# - When adding a new tool adapter, add its check IDs to existing entries.
# - When a tool changes its check ID format, update entries here AND in the
#   adapter's mappings.py DEDUP_KEY_RULES.
# - Adapter-specific DEDUP_KEY_RULES dicts reference these shared IDs.
#
# CIS version: v5.0.0 / v6.0.1 (control IDs identical for sections below)
# ScubaGear baselines: CISA M365 SCuBA (2024-2025)

# ============================================================================
# Section 1.1 -- Identity: Admin Account Governance
# ============================================================================

cis:m365:1.1.1:  # Ensure administrative accounts are cloud-only
  scubagear: "MS.AAD.7.3v1"
  maester_cisa: "CISA.MS.AAD.7.3"
  monkey365: ~   # TODO: populate when Monkey365 adapter is built
  m365_assess: ~ # TODO: populate when M365Assess adapter is built
  semantic: "entra:admin_accounts:cloud_only"

cis:m365:1.1.2:  # Ensure two emergency access accounts have been defined
  scubagear: ~   # Manual/procedural -- no ScubaGear automated check
  maester_cisa: ~
  monkey365: ~
  m365_assess: ~
  semantic: "entra:emergency_access:break_glass"

cis:m365:1.1.3:  # Ensure between two and four global admins are designated
  # Note: CISA/ScubaGear threshold is 2-8; CIS threshold is 2-4.
  scubagear: "MS.AAD.7.1v1"
  maester_cisa: "CISA.MS.AAD.7.1"
  monkey365: ~
  m365_assess: ~
  semantic: "entra:global_admins:count"

cis:m365:1.1.4:  # Ensure admin accounts use licenses with reduced app footprint
  scubagear: ~   # Licensing check -- no ScubaGear automated check
  maester_cisa: ~
  monkey365: ~
  m365_assess: ~
  semantic: "entra:admin_accounts:license_footprint"

# ============================================================================
# Section 2.1 -- Microsoft Defender: Email Security
# ============================================================================

cis:m365:2.1.1:  # Ensure Safe Links for Office Applications is Enabled
  # CISA covers via preset policies (MS.DEFENDER.1.x) rather than granular
  # Safe Links settings. No 1:1 ScubaGear check for CIS-specific Safe Links config.
  scubagear: ~
  maester_cisa: ~
  monkey365: ~
  m365_assess: ~
  semantic: "defender:safe_links:office_apps"

cis:m365:2.1.2:  # Ensure the Common Attachment Types Filter is enabled
  # EOP anti-malware EnableFileFilter setting -- no ScubaGear automated check.
  scubagear: ~
  maester_cisa: ~
  monkey365: ~
  m365_assess: ~
  semantic: "defender:antimalware:attachment_filter"

cis:m365:2.1.3:  # Ensure notifications for internal users sending malware is Enabled
  # EOP anti-malware admin notification -- no ScubaGear automated check.
  scubagear: ~
  maester_cisa: ~
  monkey365: ~
  m365_assess: ~
  semantic: "defender:antimalware:internal_notifications"

cis:m365:2.1.4:  # Ensure Safe Attachments policy is enabled
  # CISA covers via preset policies (MS.DEFENDER.1.x) rather than granular
  # Safe Attachments settings. No 1:1 ScubaGear check for CIS-specific config.
  scubagear: ~
  maester_cisa: ~
  monkey365: ~
  m365_assess: ~
  semantic: "defender:safe_attachments:email"

cis:m365:2.1.5:  # Ensure Safe Attachments for SharePoint, OneDrive, and Teams
  scubagear: "MS.DEFENDER.3.1v1"
  maester_cisa: "CISA.MS.DEFENDER.3.1"
  monkey365: ~
  m365_assess: ~
  semantic: "defender:safe_attachments:spo_odb_teams"

cis:m365:2.1.8:  # Ensure SPF records are published for all Exchange Domains
  scubagear: "MS.EXO.2.2v3"
  maester_cisa: "CISA.MS.EXO.2.2"
  monkey365: ~
  m365_assess: ~
  semantic: "exchange:email_auth:spf"

cis:m365:2.1.9:  # Ensure DKIM is enabled for all Exchange Online Domains
  scubagear: "MS.EXO.3.1v1"
  maester_cisa: "CISA.MS.EXO.3.1"
  monkey365: ~
  m365_assess: ~
  semantic: "exchange:email_auth:dkim"

cis:m365:2.1.10:  # Ensure DMARC Records for all Exchange Online domains
  # Note: ScubaGear replaced MS.EXO.2.1v1 with MS.EXO.4.1v1 (DMARC policy)
  # and MS.EXO.4.2v1 (p=reject). MS.EXO.2.1v1 is a removed policy.
  scubagear: "MS.EXO.4.1v1"
  maester_cisa: "CISA.MS.EXO.4.1"
  monkey365: ~
  m365_assess: ~
  semantic: "exchange:email_auth:dmarc"

