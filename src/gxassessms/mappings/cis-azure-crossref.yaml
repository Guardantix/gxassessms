# CIS Microsoft Azure Foundations Benchmark cross-reference mappings.
#
# Maps CIS Azure control IDs (v2.1.0 numbering) to tool-native check IDs
# across all supported tools that cover Azure infrastructure.
#
# Format:
#   cis:azure:{control_id}:
#     prowler: "{check_id}"       (metadata.event_code value)
#     monkey365: "{idSuffix}"     (if Monkey365 covers this Azure control)
#     semantic: "{human-readable description}"
#
# Maintenance:
# - Prowler check IDs are from metadata.event_code in OCSF output
# - CIS control numbers reference CIS Azure Foundations Benchmark v2.1.0
# - When adding a new tool adapter, add its check IDs to existing entries

# --- Section 1: Identity and Access Management ---

cis:azure:1.23:
  prowler: "iam_subscription_roles_owner_custom_not_created"
  semantic: "iam:custom_roles:no_custom_owner"

