# Roadmap policy reference tables.
# Phase assignment, priority scoring, and timeline estimation.

# Phase definitions: maps phase name to timeline window and description
phases:
  IMMEDIATE:
    timeline: "0-30 days"
    description: "Critical security gaps requiring immediate attention"
  SHORT_TERM:
    timeline: "30-90 days"
    description: "High-priority items for the first quarter"
  MEDIUM_TERM:
    timeline: "90-180 days"
    description: "Medium-priority improvements for the second quarter"
  LONG_TERM:
    timeline: "180+ days"
    description: "Strategic improvements and hardening"

# Phase assignment rules: maps severity to default phase
severity_to_phase:
  CRITICAL: "IMMEDIATE"
  HIGH: "SHORT_TERM"
  MEDIUM: "MEDIUM_TERM"
  LOW: "LONG_TERM"
  INFO: "LONG_TERM"

# Priority scoring weights
priority_weights:
  severity: 0.40
  confidence: 0.25
  category_weight: 0.20
  corroboration: 0.15

# Severity scores for priority computation (0-100 scale)
severity_scores:
  CRITICAL: 100
  HIGH: 75
  MEDIUM: 50
  LOW: 25
  INFO: 10

# Category priority weights: some categories get higher default priority
# Scale: 1.0 = normal, >1.0 = higher priority, <1.0 = lower priority
category_priority:
  IDENTITY_ACCESS: 1.3
  DATA_PROTECTION: 1.2
  EMAIL_COLLABORATION: 1.1
  DEVICE_MANAGEMENT: 1.0
  INFRASTRUCTURE_SECURITY: 1.1
  NETWORK_SECURITY: 1.0
  LOGGING_MONITORING: 0.9
  COST_OPTIMIZATION: 0.7
  OPERATIONAL_EXCELLENCE: 0.8
  COMPLIANCE: 1.0
  APPLICATION_SECURITY: 1.1
