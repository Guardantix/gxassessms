name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Code quality (Linux only -- these analyze code, not runtime behavior) ──
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Type check (pyright)
        run: npx pyright

  # ── SAST / security (Linux only) ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install semgrep
        run: pip install semgrep

      - name: SAST scan
        run: semgrep --config p/python --config p/security-audit --config p/secrets src/ --error

  # ── Tests (Linux + Windows -- catches cross-platform bugs) ────────────────
  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest --cov=gxassessms --cov-report=term-missing --cov-branch

      - name: Enforce coverage threshold
        run: python -m pytest --cov=gxassessms --cov-branch --cov-fail-under=80 --no-header -q
        if: matrix.os == 'ubuntu-latest'
